name: Contributor Inactivity Alert

on:
  schedule:
    - cron: '0 9 * * *'   # runs daily at 9 AM UTC
  workflow_dispatch:        # manual trigger anytime

permissions:
  issues: write

jobs:
  check-inactivity:
    runs-on: ubuntu-latest
    steps:
      - name: Check inactive contributors and open issues
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const DAYS  = 2;
            const since = new Date(
              Date.now() - DAYS * 24 * 60 * 60 * 1000
            ).toISOString();

            // Get commits from last 2 days
            const { data: commits } = await github.rest.repos.listCommits({
              owner, repo, since, per_page: 100
            });

            const activeLogins = new Set(
              commits.map(c => c.author?.login).filter(Boolean)
            );

            // Get all contributors
            const { data: contributors } = await github.rest.repos
              .listContributors({ owner, repo, per_page: 100 });

            const inactive = contributors.filter(
              c => !activeLogins.has(c.login)
            );

            if (inactive.length === 0) {
              console.log('All contributors active. No issues created.');
              return;
            }

            // Check for already-open alerts to avoid duplicates
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'inactivity-alert',
              per_page: 100
            });
            const alreadyAlerted = new Set(
              openIssues.map(i => i.title)
            );

            for (const user of inactive) {
              const title = `Inactivity alert: @${user.login}`;
              if (alreadyAlerted.has(title)) {
                console.log(`Issue already open for ${user.login}, skipping.`);
                continue;
              }
              await github.rest.issues.create({
                owner, repo,
                title,
                body: `## Contributor inactivity notice\n\n` +
                  `Hi @${user.login},\n\n` +
                  `No commits have been detected from your account in the last ` +
                  `**${DAYS} days** on this repository.\n\n` +
                  `Please push an update or comment here if you are blocked.\n\n` +
                  `> This issue was created automatically. ` +
                  `It will be closed once you push a commit.`,
                labels: ['inactivity-alert'],
                assignees: [user.login]
              });
              console.log(`Issue created for: ${user.login}`);
            }
