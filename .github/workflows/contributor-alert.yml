name: Contributor Inactivity Alert

on:
  schedule:
    - cron: '0 9 * * 1-5'   # Mon–Fri at 9 AM UTC
  workflow_dispatch:          # manual trigger anytime

permissions:
  issues: write
  contents: read
  pull-requests: read

jobs:
  check-inactivity:
    runs-on: ubuntu-latest
    steps:
      - name: Open and auto-close inactivity issues
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // Skip weekends (0 = Sunday, 6 = Saturday)
            const todayUTC = new Date().getUTCDay();
            if (todayUTC === 0 || todayUTC === 6) {
              console.log('Weekend — skipping inactivity check.');
              return;
            }

            // Count back only business days
            function subtractBusinessDays(date, days) {
              let result = new Date(date);
              let counted = 0;
              while (counted < days) {
                result.setUTCDate(result.getUTCDate() - 1);
                const day = result.getUTCDay();
                if (day !== 0 && day !== 6) counted++;
              }
              return result;
            }

            const BUSINESS_DAYS = 2;
            const since = subtractBusinessDays(
              new Date(), BUSINESS_DAYS
            ).toISOString();

            console.log(`Checking commits since: ${since}`);

            // Get all branches
            const { data: branches } = await github.rest.repos.listBranches({
              owner, repo, per_page: 100
            });

            console.log(`Branches: ${branches.map(b => b.name).join(', ')}`);

            // Collect active logins from ALL branches
            const activeLogins = new Set();
            for (const branch of branches) {
              try {
                const { data: commits } = await github.rest.repos.listCommits({
                  owner, repo, sha: branch.name, since, per_page: 100
                });
                commits
                  .map(c => c.author?.login)
                  .filter(Boolean)
                  .forEach(login => activeLogins.add(login));
              } catch (err) {
                console.log(`Skipping branch ${branch.name}: ${err.message}`);
              }
            }

            console.log(`Active: ${[...activeLogins].join(', ') || 'none'}`);

            // ── STEP 1: AUTO-CLOSE resolved issues ──
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open',
              labels: 'inactivity-alert', per_page: 100
            });

            for (const issue of openIssues) {
              // Extract username from title "Inactivity alert: @username"
              const match = issue.title.match(/Inactivity alert: @(.+)/);
              if (!match) continue;
              const login = match[1];

              if (activeLogins.has(login)) {
                // Contributor is now active — close the issue
                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: issue.number,
                  body: `Activity detected from @${login}. ` +
                    `This issue is being automatically closed.\n\n` +
                    `> Commits found across repository branches ` +
                    `within the last ${BUSINESS_DAYS} business days.`
                });
                await github.rest.issues.update({
                  owner, repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
                console.log(`Auto-closed issue for: ${login}`);
              }
            }

            // ── STEP 2: OPEN new issues for inactive contributors ──
            const { data: contributors } = await github.rest.repos
              .listContributors({ owner, repo, per_page: 100 });

            const BOT_LOGINS = ['copilot', 'github-actions', 'dependabot'];
            const inactive = contributors.filter(
              c => !activeLogins.has(c.login) &&
                   c.type !== 'Bot' &&
                   !BOT_LOGINS.includes(c.login.toLowerCase())
            );

            if (inactive.length === 0) {
              console.log('All contributors active. No new issues needed.');
              return;
            }

            console.log(`Inactive: ${inactive.map(u => u.login).join(', ')}`);

            // Re-fetch open issues after closures above
            const { data: stillOpenIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open',
              labels: 'inactivity-alert', per_page: 100
            });
            const alreadyAlerted = new Set(
              stillOpenIssues.map(i => i.title)
            );

            for (const user of inactive) {
              const title = `Inactivity alert: @${user.login}`;
              if (alreadyAlerted.has(title)) {
                console.log(`Already alerted: ${user.login} — skipping.`);
                continue;
              }
              await github.rest.issues.create({
                owner, repo, title,
                body: `## Contributor inactivity notice\n\n` +
                  `Hi @${user.login},\n\n` +
                  `No commits have been detected from your account ` +
                  `in the last **${BUSINESS_DAYS} business days** ` +
                  `across **any branch** of **${repo}**.\n\n` +
                  `Please push an update or comment below ` +
                  `if you are blocked.\n\n` +
                  `> This issue will be **automatically closed** ` +
                  `once a commit is detected from your account.`,
                labels: ['inactivity-alert'],
                assignees: [user.login]
              });
              console.log(`Issue created for: ${user.login}`);
            }
