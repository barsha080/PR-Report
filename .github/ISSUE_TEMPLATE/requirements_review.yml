name: Requirements Review
description: SRS / Requirements Review Checklist
title: "[RR] QD-XXX Requirements Review"
labels:
  - "requirement review"

body:

  - type: input
    id: jira
    attributes:
      label: Jira Sub-task ID
      placeholder: QD-123
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope of Review
      description: What feature / module is being reviewed
    validations:
      required: true

  # ---------------- GENERAL ----------------
  - type: checkboxes
    id: general_checks
    attributes:
      label: "✅ General"
      options:
        - label: Document is as per template
        - label: Title page updated (title, version, date, config ID)
        - label: Document change history is maintained
        - label: Introduction section is clear
        - label: Abbreviations & definitions identified
        - label: Reference documents identified

  - type: textarea
    id: general_findings
    attributes:
      label: "📝 General — Findings"
      description: "List defects found. Each line: `- [ ] Finding description → Author: Name`"
      placeholder: "- [ ] Finding → Author: Name"

  # ---------------- FORMATTING ----------------
  - type: checkboxes
    id: formatting_checks
    attributes:
      label: "✅ Formatting & Structure"
      options:
        - label: Proper alignment maintained
        - label: Hyperlinks are correct
        - label: Font & size as per template
        - label: No spelling/grammar issues

  - type: textarea
    id: formatting_findings
    attributes:
      label: "📝 Formatting & Structure — Findings"
      description: "List defects found. Each line: `- [ ] Finding description → Author: Name`"
      placeholder: "- [ ] Finding → Author: Name"

  # ---------------- REQUIREMENT QUALITY ----------------
  - type: checkboxes
    id: quality_checks
    attributes:
      label: "✅ Requirement Quality"
      options:
        - label: Requirements are clear and unambiguous
        - label: No conflicting requirements
        - label: Requirements are testable
        - label: Acceptance criteria defined
        - label: Edge cases considered

  - type: textarea
    id: quality_findings
    attributes:
      label: "📝 Requirement Quality — Findings"
      description: "List defects found. Each line: `- [ ] Finding description → Author: Name`"
      placeholder: "- [ ] Finding → Author: Name"

  # ---------------- COMPLETENESS ----------------
  - type: checkboxes
    id: completeness_checks
    attributes:
      label: "✅ Completeness"
      options:
        - label: All functional requirements captured
        - label: Non-functional requirements included
        - label: Dependencies identified
        - label: Assumptions documented

  - type: textarea
    id: completeness_findings
    attributes:
      label: "📝 Completeness — Findings"
      description: "List defects found. Each line: `- [ ] Finding description → Author: Name`"
      placeholder: "- [ ] Finding → Author: Name"

  # ---------------- TRACEABILITY ----------------
  - type: checkboxes
    id: traceability_checks
    attributes:
      label: "✅ Traceability"
      options:
        - label: Requirements mapped to Feature / User Story
        - label: Traceability maintained
        - label: No orphan requirements

  - type: textarea
    id: traceability_findings
    attributes:
      label: "📝 Traceability — Findings"
      description: "List defects found. Each line: `- [ ] Finding description → Author: Name`"
      placeholder: "- [ ] Finding → Author: Name"

  # ---------------- REVIEW RESULT ----------------
  - type: dropdown
    id: result
    attributes:
      label: Review Result
      options:
        - Approved
        - Approved with comments
        - Rework required
    validations:
      required: true

  - type: textarea
    id: comments
    attributes:
      label: Overall Review Comments
      description: Summary of all findings / defects across sections
